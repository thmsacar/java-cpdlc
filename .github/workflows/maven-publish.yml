name: Build and Release App

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pkg_type: exe
            icon_ext: ico
          - os: macos-latest
            pkg_type: dmg
            icon_ext: icns

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package

    - name: Clean Extra Jars
      shell: bash
      run: |
        rm -f target/original-*.jar
        rm -f target/*-shaded.jar

    - name: Extract Version
      id: get_version
      shell: bash
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
        else
          echo "VERSION=draft" >> $GITHUB_ENV
        fi

    - name: Pack Application with jpackage
      shell: bash
      run: |
        MAIN_JAR=$(ls target/*.jar | head -n 1)
        EXTRA_OPTS=""
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          EXTRA_OPTS="--win-shortcut --win-menu --win-dir-chooser --win-menu-group JavaCPDLC"
        fi
        jpackage \
          --name "JavaCPDLC" \
          --input target/ \
          --main-jar $(basename $MAIN_JAR) \
          --type ${{ matrix.pkg_type }} \
          --icon src/resources/icon.${{ matrix.icon_ext }} \
          --app-version ${{ env.VERSION == 'draft' && '1.0.0' || env.VERSION }} \
          $EXTRA_OPTS

    - name: Prepare JAR for Release
      shell: bash
      run: |
        cp target/*.jar JavaCPDLC-v${{ env.VERSION }}.jar

    - name: Create or Update Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        body_path: RELEASE_NOTES.md
        files: |
          *.exe
          *.dmg
          *.jar
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
